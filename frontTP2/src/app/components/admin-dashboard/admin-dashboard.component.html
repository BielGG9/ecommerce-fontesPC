<div class="d-flex" id="wrapper" [class.dark-theme]="isDarkMode">
  
  <!-- Sidebar -->
  <div class="bg-white border-0 sidebar" [ngClass]="{'collapsed': isCollapsed}" id="sidebar-wrapper">
    <div class="sidebar-heading fw-bold d-flex align-items-center justify-content-center">
      <i class="bi bi-shield-lock-fill fs-4 me-2 text-primary"></i>
      <span class="sidebar-text">Admin Panel</span>
    </div>
    <div class="list-group list-group-flush mt-4">
      <a *ngFor="let item of menuItems" 
         [routerLink]="item.route" 
         routerLinkActive="active" 
         [routerLinkActiveOptions]="{exact: item.route === '/admin'}"
         class="list-group-item list-group-item-action d-flex align-items-center"
         [title]="isCollapsed ? item.name : ''">
        <i [class]="item.icon + ' fs-5'"></i>
        <span class="sidebar-text ms-3">{{ item.name }}</span>
      </a>
    </div>
  </div>

  <!-- Page Content -->
  <div id="page-content-wrapper" class="bg-light-custom" [ngClass]="{'collapsed': isCollapsed}">
    
    <!-- Topbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom topbar px-4">
      <div class="d-flex align-items-center w-100">
        <!-- Hamburguer Toggle Button -->
        <button class="btn btn-light me-3 d-flex align-items-center justify-content-center border-0 shadow-sm rounded-circle p-2" (click)="toggleSidebar()" id="menu-toggle">
          <i class="bi bi-list fs-4"></i>
        </button>

        <!-- Dark/Light Mode Toggle -->
        <button class="btn btn-light me-3 d-flex align-items-center justify-content-center border-0 shadow-sm rounded-circle p-2 theme-toggle" (click)="toggleTheme()" title="Alternar Tema">
          <i class="bi" [ngClass]="isDarkMode ? 'bi-sun-fill text-warning' : 'bi-moon-fill text-primary'" class="fs-5"></i>
        </button>
        
        <!-- Search Bar -->
        <form class="d-none d-md-flex ms-2 w-50">
          <div class="input-group shadow-sm rounded-pill overflow-hidden">
            <span class="input-group-text bg-light border-0 px-3"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-0 bg-light shadow-none" placeholder="Pesquisar registros, módulos..." aria-label="Pesquisar">
          </div>
        </form>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="container-fluid p-4 main-content">
      
      <!-- Stats Cards Row -->
      <div class="row g-4 mb-5">
        <div class="col-xl-3 col-md-6" *ngFor="let stat of stats">
          <div class="card stat-card shadow-sm border-0 h-100 rounded-4">
            <div class="card-body p-4">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <p class="text-muted text-uppercase small fw-bold mb-1 letter-spacing-1">{{ stat.title }}</p>
                  <h3 class="fw-bold mb-0 text-dark">{{ stat.value }}</h3>
                </div>
                <div class="icon-shape rounded-circle p-3 d-flex align-items-center justify-content-center" [ngClass]="stat.bgColor">
                  <i [class]="stat.icon + ' fs-3 ' + stat.colorClass"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Modules Grid (Acesso Rápido) -->
      <div class="d-flex justify-content-between align-items-end mb-4 mt-2">
        <div>
          <h2 class="h4 mb-1 text-gray-800 fw-bold">Acesso Rápido</h2>
          <p class="text-muted mb-0">Navegue pelas principais áreas de gestão administrativa.</p>
        </div>
      </div>

      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <ng-container *ngFor="let module of menuItems">
          <div class="col" *ngIf="module.name !== 'Dashboard'">
            <div class="card module-card h-100 shadow-sm border-0 rounded-4 overflow-hidden">
              <div class="card-body text-center p-4">
                <div class="icon-wrapper mb-4 text-primary bg-primary-subtle rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                  <i [class]="module.icon + ' fs-1'"></i>
                </div>
                <h5 class="card-title fw-bold mb-2 text-dark">{{ module.name }}</h5>
                <p class="card-text text-muted small px-2">{{ module.description }}</p>
              </div>
              <div class="card-footer bg-transparent border-0 pb-4 pt-0 px-4 text-center">
                <button [routerLink]="module.route" class="btn btn-outline-primary w-100 rounded-pill fw-semibold hover-elevate">
                  Acessar
                </button>
              </div>
            </div>
          </div>
        </ng-container>
      </div>

    </div>
  </div>
</div>
