<div style="padding: 20px;">
  
  <div style="display: flex; justify-content: space-between; align-items: center; background-color: #f8f9fa; padding: 15px 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 30px;">
    
    <h2 style="margin: 0; color: #333;">E-commerce Fontes PC</h2>


    <button mat-icon-button 
        aria-label="Carrinho de compras"
        [matBadge]="carrinhoService.quantidadeTotal()" 
        matBadgeColor="warn"
        [matBadgeHidden]="carrinhoService.quantidadeTotal() === 0">
  <mat-icon>shopping_cart</mat-icon>
</button>

    <div style="display: flex; gap: 15px; align-items: center;">
      @if (usuarioLogado) {
        <div style="display: flex; gap: 15px; align-items: center;">
          <span style="font-weight: bold; color: #555;">Olá, {{ nomeUsuario }}!</span>
          <button (click)="sair()" style="padding: 10px 20px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Sair
          </button>
        </div>
        
      } @else {
        <button [routerLink]="['/login']" title="Faça seu login ou crie uma conta" style="padding: 10px 20px; background-color: #0d6efd; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
          Login
        </button>
      }
    </div>
  </div>



  <router-outlet></router-outlet>

</div>
