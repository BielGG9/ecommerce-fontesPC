<!-- Global Navbar -->
@if (!isAdminRoute) {
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4 border-bottom">
    <div class="container-fluid d-flex justify-content-between align-items-center px-4">
      
      <!-- Branding -->
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center" [routerLink]="['/']">
        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2 shadow-sm" style="width: 35px; height: 35px;">
          <i class="bi bi-lightning-fill"></i>
        </div>
        Fontes PC
      </a>

      <!-- User Information & Cart Container -->
      <div class="d-flex align-items-center gap-3">
        <!-- Carrinho -->
        <button [routerLink]="['/carrinho']" class="btn btn-outline-primary position-relative rounded-circle p-2 border-0 shadow-sm" title="Ir para o Carrinho">
          <i class="bi bi-cart3 fs-5"></i>
          @if (carrinhoService.quantidadeTotal() > 0) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65em;">
              {{ carrinhoService.quantidadeTotal() }}
            </span>
          }
        </button>

        @if (usuarioLogado) {
          <div class="d-flex align-items-center bg-light rounded-pill px-3 py-1 border shadow-sm hover-shadow transition-all">
            <!-- Texto visível em telas maiores -->
            <span class="me-3 fw-medium text-secondary d-none d-sm-inline">
              Olá, <span class="fw-bold text-primary">{{ nomeUsuario }}</span>!
            </span>
            <!-- Ícone visível em celular -->
            <span class="me-2 fw-medium text-secondary d-inline d-sm-none" title="Olá, {{ nomeUsuario }}!">
              <i class="bi bi-person-circle fs-5 text-primary"></i>
            </span>
            
            <button (click)="sair()" class="btn btn-sm btn-outline-danger rounded-pill fw-bold px-3">
              Sair
            </button>
          </div>
        } @else {
          <button [routerLink]="['/login']" title="Faça seu login ou crie uma conta" class="btn btn-primary rounded-pill fw-bold px-4 shadow-sm">
            Login
          </button>
        }
      </div>
      
    </div>
  </nav>
}

<!-- Main App Content -->
<router-outlet></router-outlet>
