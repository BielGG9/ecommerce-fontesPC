<div class="marca-container">
  
  <mat-card class="material-card">
    
    <div class="card-header-azul">
      <h2 style="margin: 0; font-size: 20px;">Gestão de Marcas</h2>
    </div>

    <form [formGroup]="marcaForm" (ngSubmit)="salvar()">
      
      <mat-card-content style="padding-top: 20px;">
        
        <mat-form-field appearance="outline" style="width: 100%;">
          <mat-label>Nome da Marca</mat-label>
          <input matInput formControlName="nome" placeholder="Ex: Corsair, EVGA, XPG...">
          <mat-error *ngIf="marcaForm.get('nome')?.invalid">O nome da marca é obrigatório</mat-error>
        </mat-form-field>

      </mat-card-content>

      <mat-card-actions align="end" style="padding: 16px;">
        
        <button *ngIf="marcaForm.value.id" mat-button type="button" (click)="resetForm()">
          Cancelar
        </button>

        <button mat-raised-button color="primary" type="submit" [disabled]="marcaForm.invalid">
          {{ marcaForm.value.id ? 'Atualizar' : 'Salvar' }}
        </button>

      </mat-card-actions>
    </form>
  </mat-card>

<table mat-table [dataSource]="marcas()" class="mat-elevation-z8" style="width: 100%; border-radius: 8px; margin-bottom: 30px;">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef style="width: 80px; font-weight: bold;"> ID </th>
      <td mat-cell *matCellDef="let marca"> {{marca.id}} </td>
    </ng-container>

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef style="font-weight: bold;"> Nome da Marca </th>
      <td mat-cell *matCellDef="let marca"> {{marca.nome}} </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef style="width: 120px; text-align: center; font-weight: bold;"> Ações </th>
      <td mat-cell *matCellDef="let marca" style="text-align: center;">
        
        <button mat-icon-button color="primary" (click)="editar(marca)" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn" (click)="excluir(marca.id!)" title="Excluir">
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>

  </table>

  <div *ngIf="marcas().length === 0" style="text-align: center; padding: 20px; color: #666;">
    Nenhuma marca registada no momento.
  </div>
</div>
