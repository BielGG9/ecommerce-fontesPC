<div>
  <h1>Fontes Disponíveis</h1>

  <ul style="list-style-type: none; padding: 0;">
    <li *ngFor="let fonte of fontes()" style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; display: flex; align-items: center;">
      <img
        src="https://a-static.mlcdn.com.br/280x210/fonte-atx-500w-reais-20-4p-super-silenciosa-para-pc-bivolt-ketchup/techguia/319p/2b3455103cc5b379e4db141c9cbba37b.jpeg"
        alt="Imagem ilustrativa"
        style="width: 130px; height: 120px; margin-right: 20px; object-fit: cover; border: 2px solid #ddd; border-radius: 8px;"
      >
      <div>
        <strong style="font-size: 18px;">{{ fonte.nome }}</strong> - <span style="color: #666;">{{ fonte.marca?.nome || 'Marca Desconhecida' }}</span> <br>
        <span style="color: #198754; font-weight: bold;">Preço: R$ {{ fonte.preco }}</span> | Potência: {{ fonte.potencia }}
      </div>
    </li>
  </ul>
</div>
