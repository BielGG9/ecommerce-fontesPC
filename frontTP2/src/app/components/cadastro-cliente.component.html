<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    
    <div>
      <h2 class="text-center text-3xl font-extrabold text-gray-900">
        Criar Conta
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        Rápido, fácil e sem burocracia
      </p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="criarContaRapida()">
      <div class="rounded-md shadow-sm space-y-4">
        
        <div>
          <label for="nome" class="block text-sm font-medium text-gray-700">Nome Completo</label>
          <input id="nome" name="nome" type="text" required [(ngModel)]="nome"
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" 
            placeholder="Seu nome">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">E-mail</label>
          <input id="email" name="email" type="email" required [(ngModel)]="email"
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" 
            placeholder="voce@exemplo.com">
        </div>

        <div>
          <label for="senha" class="block text-sm font-medium text-gray-700">Senha</label>
          <input id="senha" name="senha" type="password" required [(ngModel)]="senha"
            class="appearance-none relative block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mt-1" 
            placeholder="••••••••">
        </div>

      </div>

      <div>
        <button type="submit" [disabled]="isLoading"
          class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors disabled:opacity-70">
          <span *ngIf="!isLoading">Criar Conta Rápida</span>
          <span *ngIf="isLoading">Criando...</span>
        </button>
      </div>
    </form>

    <!-- Link para o login -->
    <div class="mt-4 text-center text-sm text-gray-600">
      Já tem conta? <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500">Entrar</a>
    </div>

    <!-- Separador -->
    <div class="my-4 flex items-center">
      <div class="flex-grow border-t border-gray-200"></div>
      <span class="mx-3 text-xs text-gray-400 uppercase tracking-wide">ou</span>
      <div class="flex-grow border-t border-gray-200"></div>
    </div>

    <!-- Link para cadastro completo -->
    <div class="text-center text-sm text-gray-600 pb-6">
      Prefere fornecer todos os dados agora? <br>
      <a routerLink="/cadastro-completo" class="font-medium text-indigo-600 hover:text-indigo-500">
        Fazer Cadastro Completo (CPF, RG...)
      </a>
    </div>

  </div>
</div>
