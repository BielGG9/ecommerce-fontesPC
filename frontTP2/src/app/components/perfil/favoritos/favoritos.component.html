<div class="favoritos-container">
  <!-- Header com botão voltar -->
  <div class="perfil-header-nav">
    <h2 class="title" style="margin: 0; display: flex; align-items: center; gap: 8px;"><mat-icon>favorite</mat-icon> Meus Favoritos</h2>
    <button mat-button class="btn-voltar" [routerLink]="['/minha-conta']">
      <mat-icon>arrow_back</mat-icon> Voltar ao Painel
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    <mat-spinner [diameter]="50"></mat-spinner>
    <p>Carregando favoritos...</p>
  </div>

  <div *ngIf="!isLoading">
    <div *ngIf="favoritos.length === 0" class="empty-state">
      <mat-icon class="empty-icon">favorite_border</mat-icon>
      <p>Você ainda não possui favoritos.</p>
      <button mat-raised-button color="primary" routerLink="/">Explorar Produtos</button>
    </div>

    <div *ngIf="favoritos.length > 0" class="favoritos-list">
      <div *ngFor="let item of favoritos" class="favoritos-item">
        <div class="d-flex align-items-center">
          <!-- Thumbnail do Produto -->
          <div class="thumbnail-favorito me-3 bg-light rounded d-flex align-items-center justify-center border" style="width: 64px; height: 64px; overflow: hidden; flex-shrink: 0;">
            @if (getFirstImageUrl(item.fonte)) {
              <img [src]="getFirstImageUrl(item.fonte)" alt="{{ item.fonte?.nome }}" class="max-h-full max-w-full object-contain p-1" style="max-width: 64px; max-height: 64px;" />
            } @else {
              <mat-icon style="color: #0d6efd;">bolt</mat-icon>
            }
          </div>
          <div class="item-info">
            <span class="item-name">{{ item.fonte?.nome || 'Produto Sem Nome' }}</span>
            <span class="item-price">{{ (item.fonte?.preco || 0) | currency:'BRL':'symbol':'1.2-2' }}</span>
          </div>
        </div>
        <div class="item-actions">
          <button mat-raised-button color="primary" (click)="adicionarAoCarrinho(item)">
            <mat-icon>shopping_cart</mat-icon> Adicionar ao Carrinho
          </button>
          <button mat-stroked-button color="warn" (click)="remover(item)">
            <mat-icon>delete</mat-icon> Remover
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
