version: '3.8'

services:
  postgres-keycloak:
    image: postgres:15
    container_name: postgres-keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" 

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_server 
    command: start-dev --import-realm
    volumes:
      - ./export:/opt/keycloak/data/import
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - postgres-keycloak

  mailpit:
    image: axllent/mailpit
    container_name: mailpit_server
    ports:
      - "8025:8025" # Porta da interface web (onde você vai ler os e-mails)
      - "1025:1025" # Porta SMTP (onde o Keycloak vai entregar os e-mails)

  minio:
    image: minio/minio:latest
    container_name: minio_storage
    ports:
      - "9000:9000" # Porta da API (onde o Quarkus vai conversar)
      - "9001:9001" # Porta do Painel Administrativo (Navegador)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
