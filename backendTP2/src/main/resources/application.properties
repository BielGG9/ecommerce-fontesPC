# ====== BANCO DE DADOS ======
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gbtp1
quarkus.datasource.username=bieltp1
quarkus.datasource.password=150326

# ====== HIBERNATE ======
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=none

%dev.quarkus.hibernate-orm.sql-load-script=import.sql
%test.quarkus.hibernate-orm.sql-load-script=import.sql

quarkus.hibernate-orm.log.sql=true

# ====== HTTP ======
quarkus.http.port=8081
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.auth.proactive=false

# ====== OIDC / KEYCLOAK ======
quarkus.oidc.devservices.enabled=false
quarkus.keycloak.devservices.enabled=false
quarkus.oidc.auth-server-url=http://localhost:8080/realms/TP2
quarkus.oidc.client-id=quarkuss

quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=realm_access/roles
quarkus.oidc.token-cache.enabled=false
quarkus.oidc.token.allow-jwt-introspection=false
quarkus.oidc.token.allow-opaque-token-fallback=false

# ====== SWAGGER ======
quarkus.smallrye-openapi.auto-add-security=false
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.oauth-client-id=swagger
quarkus.swagger-ui.oauth2-redirect-url=http://localhost:8081/q/swagger-ui/oauth2-redirect.html

# ====== Teste ======
%test.quarkus.http.port=8082
%test.quarkus.oidc.enabled=false
%test.quarkus.smallrye-jwt.enabled=false
%test.quarkus.swagger-ui.always-include=false

# Ativa o nível DEBUG para o logger do OpenAPI
quarkus.log.category."io.quarkus.smallrye.openapi".level=DEBUG
# Opcional: Para ver o processo de inicialização de componentes do Quarkus
quarkus.log.category."io.quarkus.deployment".level=INFO

# ==========================================================
# CONFIGURAÇÃO DO KEYCLOAK ADMIN CLIENT (Criação de utilizadores)
# ==========================================================
quarkus.keycloak.admin-client.server-url=http://localhost:8080
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.username=admin
quarkus.keycloak.admin-client.password=admin
quarkus.keycloak.admin-client.grant-type=PASSWORD
